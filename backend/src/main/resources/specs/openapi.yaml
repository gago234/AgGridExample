openapi: 3.0.0
info:
  title: Olympics API
  version: 1.0.0
  description: API for Olympics data

servers:
  - url: http://localhost:4001/api

paths:
  /data:
    post:
      tags:
        - olympic        
      summary: Get Olympic data with server-side pagination
      description: Retrieve Olympic athlete data with support for pagination, sorting, and filtering
      operationId: getData
      requestBody:
        description: Server-side request with pagination, sorting, and filter parameters
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerSideRequest'
      responses:
        '200':
          description: Successfully retrieved data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerSideResponse'
        '400':
          description: Invalid request parameters
  
  /countries:
    get:
      tags:
        - olympic    
      summary: Get all countries
      description: Retrieve a list of all unique countries in the Olympic data
      operationId: getCountries
      responses:
        '200':
          description: Successfully retrieved countries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["USA", "China", "Russia", "Great Britain"]


components:
  schemas:
    ServerSideResponse:
      type: object
      required:
        - success
        - rows
        - lastRow
      properties:
        success:
          type: boolean
          description: Whether the request was successful
          example: true
        rows:
          type: array
          description: List of data rows for the current page
          items:
            type: object
        lastRow:
          type: integer
          format: int64
          description: Total number of rows available
          example: 1000

    ServerSideRequest:
      type: object
      properties:
        startRow:
          type: integer
          description: Starting row index for pagination
          example: 0
        endRow:
          type: integer
          description: Ending row index for pagination
          example: 100
        sortModel:
          type: array
          description: List of columns to sort by with sort direction
          items:
            $ref: '#/components/schemas/SortModel'
        filterModel:
          type: object
          description: >-
            Map of column filters keyed by column ID.
            Each value is an AG Grid ColumnFilter (text, number, or combined).
          additionalProperties:
            $ref: '#/components/schemas/ColumnFilter'

    SortModel:
      type: object
      properties:
        colId:
          type: string
          description: Column ID to sort by
          example: athlete
        sort:
          type: string
          description: Sort direction
          example: asc
          enum:
            - asc
            - desc

    ColumnFilter:
      type: object
      description: >-
        AG Grid column filter model. For a single condition: filterType, type,
        filter, and optionally filterTo (for inRange). For combined conditions:
        filterType, operator, and conditions array.
      properties:
        filterType:
          type: string
          description: Type of filter (text, number)
        type:
          type: string
          description: >-
            Filter operation (equals, notEqual, contains, notContains,
            startsWith, endsWith, lessThan, lessThanOrEqual, greaterThan,
            greaterThanOrEqual, inRange, blank, notBlank)
        filter:
          description: Primary filter value (string for text filters, number for numeric filters)
        filterTo:
          description: Secondary filter value (used with inRange)
        operator:
          type: string
          description: Join operator for combined conditions
          enum:
            - AND
            - OR
        conditions:
          type: array
          description: Array of filter conditions when using combined filters
          items:
            $ref: '#/components/schemas/ColumnFilter'

  responses:
    ServerSideResponse:
      description: Server-side response with paginated data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerSideResponse'