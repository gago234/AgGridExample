info:
  name: Get Age Custom
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:4001/api/data
  body:
    type: json
    data: |-
      {
          "startRow": 0,
          "endRow": 100,
          "sortModel": [],
          "filterModel": {
              "age": {
                  "filterType": "number",
                  "type": "equals",
                  "filter": 25
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
