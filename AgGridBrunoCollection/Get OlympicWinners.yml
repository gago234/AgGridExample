info:
  name: Get OlympicWinners
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:4001/api/data
  body:
    type: json
    data: |-
      {
        "startRow": 0,
        "endRow": 100,
          "filterModel": {
            "country": {
              "filterType": "text",
              "type": "contains",
              "filter": "USA"
            }
          },
          "sortModel": [
            {
              "colId": "athlete",
              "sort": "asc"
            }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
